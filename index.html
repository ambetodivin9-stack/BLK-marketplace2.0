<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLK Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f0e8; color: #1a1a1a; }
        .kente { height: 6px; background: linear-gradient(90deg, #FFD700 20%, #2ECC71 40%, #E74C3C 60%, #FFD700 80%); }
        .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: linear-gradient(135deg, #FFD700, #FF8C00); }
        .auth-page .card { background: rgba(255,255,255,0.85); padding: 32px 24px; border-radius: 24px; max-width: 400px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .auth-page h1 { text-align: center; font-size: 32px; font-weight: 800; color: #1a1a1a; }
        .auth-page .sub { text-align: center; color: #666; margin-bottom: 24px; }
        .auth-page input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 14px; font-size: 16px; margin-bottom: 12px; background: white; }
        .auth-page input:focus { outline: none; border-color: #E74C3C; }
        .btn { padding: 14px; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-primary { background: #E74C3C; color: white; }
        .btn-primary:hover { background: #C0392B; }
        .btn-success { background: #2ECC71; color: white; }
        .btn-success:hover { background: #27AE60; }
        .btn-danger { background: #E74C3C; color: white; }
        .btn-danger:hover { background: #C0392B; }
        .btn-outline { background: transparent; color: #E74C3C; border: 2px solid #E74C3C; }
        .welcome-screen { display: none; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; background: linear-gradient(135deg, #FFD700, #2ECC71, #E74C3C); text-align: center; color: white; }
        .welcome-screen.active { display: flex; }
        .welcome-screen h1 { font-size: 48px; font-weight: 900; text-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .welcome-screen h1 span { color: #1a1a1a; }
        .welcome-screen p { font-size: 18px; max-width: 300px; margin: 16px auto 32px; opacity: 0.9; }
        .welcome-screen .btn { background: white; color: #1a1a1a; max-width: 280px; margin: 0 auto; }
        .app { display: none; max-width: 600px; margin: 0 auto; padding: 80px 16px 100px; }
        .app.active { display: block; }
        .card { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.4); }
        .wallet-balance { font-size: 36px; font-weight: 800; color: #2ECC71; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: rgba(255,255,255,0.5); border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; min-width: 60px; }
        .tab-btn.active { background: #E74C3C; color: white; }
        .page { display: none; }
        .page.active { display: block; }
        .alert { padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; display: none; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .empty { text-align: center; color: #999; padding: 20px; }
        .admin-card { max-width: 500px; margin: 40px auto; background: white; padding: 24px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .admin-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        .admin-card .btn { margin-top: 8px; }
        #adminResult { margin-top: 12px; }
    </style>
</head>
<body>
    <div class="kente"></div>

<!-- AUTH -->
<div class="auth-page" id="authPage">
    <div class="card">
        <h1>BLK</h1>
        <p class="sub">Bienvenue sur BLK Marketplace</p>
        <input type="text" id="loginName" placeholder="Nom complet" value="Divin Ambeto">
        <input type="email" id="loginEmail" placeholder="Adresse e-mail" value="ambetodivin9@gmail.com">
        <button class="btn btn-primary" id="btnLogin">Se connecter</button>
    </div>
</div>

<!-- WELCOME -->
<div class="welcome-screen" id="welcomeScreen">
    <div>
        <h1>BLK<span>.</span></h1>
        <p>Bienvenue dans l'univers BLK</p>
        <p>La mode et les accessoires à portée de main.</p>
        <button class="btn" id="welcomeBtn">Découvrir</button>
    </div>
</div>

<!-- APP -->
<div class="app" id="appContainer">
    <div id="alertBox" class="alert"></div>

    <div class="tabs" id="tabs">
        <button class="tab-btn active" data-page="pageHome">🏠 Accueil</button>
        <button class="tab-btn" data-page="pageProfile">👤 Profil</button>
    </div>

    <div class="page active" id="pageHome">
        <div class="card">
            <h3>📦 Articles</h3>
            <div id="productsGrid"><p class="empty">Chargement...</p></div>
        </div>
    </div>

    <div class="page" id="pageProfile">
        <div class="card" style="text-align:center;">
            <h3 id="profileName">Utilisateur</h3>
            <p style="color:#666;" id="profileEmail">email@example.com</p>
            <p style="color:#666;" id="profilePhone">+242 06 XXX XXXX</p>
            <p>🔥 <span id="profileFlames">0</span> flammes</p>
        </div>

        <div class="card">
            <h3 style="color:#2ECC71;">💰 Wallet BLK</h3>
            <p class="wallet-balance"><span id="walletBalance">0</span> FCFA</p>
            <button class="btn btn-success" id="btnDeposit">Déposer</button>
            <button class="btn btn-primary" id="btnWithdraw" style="margin-top:8px;">Retirer</button>
        </div>

        <div class="card">
            <h3>📋 Historique</h3>
            <div id="transactionsList"></div>
            <div id="emptyTransactions" class="empty" style="display:none;">Aucune transaction</div>
        </div>

        <button class="btn btn-danger" id="btnLogout">🚪 Déconnexion</button>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    var BACKEND_URL = 'https://blk-marketplace2-0.onrender.com';
    var STORAGE_KEY = 'blk_user_id';
    var currentUser = null;
    var currentUserId = null;

    // ============================================================
    // UTILITAIRES
    // ============================================================
    function showAlert(message, type) {
        var box = document.getElementById('alertBox');
        box.textContent = message;
        box.className = 'alert alert-' + (type || 'success');
        box.style.display = 'block';
        clearTimeout(box._timeout);
        box._timeout = setTimeout(function() {
            box.style.display = 'none';
        }, 4000);
    }

    // ============================================================
    // AUTH
    // ============================================================
    function handleLogin(name, email) {
        var userId = localStorage.getItem(STORAGE_KEY);
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem(STORAGE_KEY, userId);
        }
        currentUserId = userId;
        currentUser = {
            name: name || 'Utilisateur',
            email: email || 'user@example.com',
            phone: '+242 06 XXX XXXX',
            walletBalance: 0,
            id: userId
        };

        document.getElementById('authPage').style.display = 'none';
        document.getElementById('welcomeScreen').classList.add('active');

        document.getElementById('welcomeBtn').onclick = function() {
            document.getElementById('welcomeScreen').classList.remove('active');
            showMainApp();
            showAlert('Bienvenue ' + currentUser.name, 'success');
            // Envoyer online status au backend
            fetch(BACKEND_URL + '/api/users/online', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUserId, online: true })
            }).catch(function(e) { console.log(e); });
        };
    }

    document.getElementById('btnLogin').addEventListener('click', function() {
        var name = document.getElementById('loginName').value.trim() || 'Utilisateur';
        var email = document.getElementById('loginEmail').value.trim() || 'user@example.com';
        handleLogin(name, email);
    });

    // ============================================================
    // MAIN APP
    // ============================================================
    function showMainApp() {
        document.getElementById('appContainer').classList.add('active');
        document.getElementById('profileName').textContent = currentUser.name;
        document.getElementById('profileEmail').textContent = currentUser.email;
        document.getElementById('profilePhone').textContent = currentUser.phone;
        document.getElementById('profileFlames').textContent = 0;

        loadProducts();
        loadWallet();
        loadTransactions();
    }

    // ============================================================
    // TABS
    // ============================================================
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            this.classList.add('active');
            document.getElementById(this.dataset.page).classList.add('active');
        });
    });

    // ============================================================
    // PRODUCTS (exemple statique)
    // ============================================================
    function loadProducts() {
        var grid = document.getElementById('productsGrid');
        var articles = [
            { title: 'Robe vintage', price: 15000, seller: 'Marie' },
            { title: 'Chemise blanche', price: 8000, seller: 'Jean' },
            { title: 'Sac à main', price: 25000, seller: 'Sophie' }
        ];
        grid.innerHTML = '';
        articles.forEach(function(a) {
            var div = document.createElement('div');
            div.style.cssText = 'background:white; padding:12px; border-radius:12px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,0.05);';
            div.innerHTML = '<strong>' + a.title + '</strong><br>' + a.price + ' FCFA<br><span style="font-size:12px;color:#999;">' + a.seller + '</span>';
            grid.appendChild(div);
        });
    }

    // ============================================================
    // WALLET
    // ============================================================
    function loadWallet() {
        if (!currentUserId) return;
        fetch(BACKEND_URL + '/api/wallet/' + currentUserId)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                document.getElementById('walletBalance').textContent = data.balance || 0;
            })
            .catch(function(e) { console.error(e); });
    }

    // ============================================================
    // DEPOSIT
    // ============================================================
    document.getElementById('btnDeposit').addEventListener('click', function() {
        var amount = prompt('Montant (FCFA) :', '500');
        if (!amount) return;
        var phone = prompt('Numéro MTN :', '065918166');
        if (!phone) return;

        showAlert('Envoi de la demande...', 'success');

        fetch(BACKEND_URL + '/api/wallet/deposit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: currentUserId,
                amount: parseInt(amount),
                phone: phone
            })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                showAlert(data.message, 'success');
                loadWallet();
                loadTransactions();
            } else {
                showAlert('Erreur: ' + data.message, 'error');
            }
        })
        .catch(function(e) {
            showAlert('Erreur: ' + e.message, 'error');
        });
    });

    document.getElementById('btnWithdraw').addEventListener('click', function() {
        showAlert('Fonction en développement', 'error');
    });

    // ============================================================
    // TRANSACTIONS
    // ============================================================
    function loadTransactions() {
        if (!currentUserId) return;
        fetch(BACKEND_URL + '/api/transactions/' + currentUserId)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var container = document.getElementById('transactionsList');
                var empty = document.getElementById('emptyTransactions');
                if (!data.success || !data.data || data.data.length === 0) {
                    container.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';
                container.innerHTML = '';
                data.data.slice(0, 10).forEach(function(t) {
                    var div = document.createElement('div');
                    div.style.cssText = 'display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee;';
                    div.innerHTML = '<span>' + (t.description || t.type) + '</span><span>' + (t.amount || 0) + ' FCFA</span>';
                    container.appendChild(div);
                });
            })
            .catch(function(e) { console.error(e); });
    }

    // ============================================================
    // LOGOUT
    // ============================================================
    document.getElementById('btnLogout').addEventListener('click', function() {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    });

    // ============================================================
    // ADMIN PAGE (via #admin)
    // ============================================================
    if (window.location.hash === '#admin') {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('appContainer').classList.add('active');
        document.getElementById('tabs').style.display = 'none';

        var adminHtml = `
            <div class="admin-card">
                <h2 style="color:#E74C3C;">🔐 Admin BLK</h2>
                <p>Créditer un wallet après réception du virement.</p>
                <div id="adminLogin">
                    <input type="password" id="adminPassword" placeholder="Mot de passe">
                    <button class="btn btn-primary" id="btnAdminLogin">Accéder</button>
                </div>
                <div id="adminPanel" style="display:none; margin-top:16px;">
                    <input type="text" id="adminUserId" placeholder="ID utilisateur (ex: user_...)">
                    <input type="number" id="adminAmount" placeholder="Montant (FCFA)">
                    <button class="btn btn-success" id="btnAdminCredit">💰 Créditer</button>
                    <div id="adminResult"></div>
                </div>
            </div>
        `;
        document.getElementById('appContainer').innerHTML = adminHtml;

        document.getElementById('btnAdminLogin').addEventListener('click', function() {
            var pwd = document.getElementById('adminPassword').value;
            if (pwd === 'BLK2026') {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                showAlert('Accès accordé', 'success');
            } else {
                showAlert('Mot de passe incorrect', 'error');
            }
        });

        document.getElementById('btnAdminCredit').addEventListener('click', function() {
            var userId = document.getElementById('adminUserId').value.trim();
            var amount = parseInt(document.getElementById('adminAmount').value);
            if (!userId || !amount) {
                showAlert('User ID et montant requis', 'error');
                return;
            }
            fetch(BACKEND_URL + '/api/wallet/admin-credit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, amount: amount, phone: '065918166' })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    showAlert('Wallet crédité de ' + amount + ' FCFA', 'success');
                    document.getElementById('adminUserId').value = '';
                    document.getElementById('adminAmount').value = '';
                } else {
                    showAlert('Erreur: ' + data.message, 'error');
                }
            })
            .catch(function(e) {
                showAlert('Erreur: ' + e.message, 'error');
            });
        });
    }

    // ============================================================
    // INIT
    // ============================================================
    console.log('✅ BLK Marketplace - Version stable');
    console.log('🔗 Backend URL:', BACKEND_URL);
</script>
</body>
</html>

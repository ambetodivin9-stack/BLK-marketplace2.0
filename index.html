<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f0e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h1 { text-align: center; color: #FFD700; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 100%; padding: 12px; background: #FFD700; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:hover { background: #f5c400; }
        .status { text-align: center; margin-top: 10px; font-size: 14px; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BLK Marketplace</h1>
        <input type="text" id="phone" placeholder="Numéro de téléphone" />
        <input type="text" id="name" placeholder="Nom (optionnel)" />
        <button id="loginBtn">Se connecter</button>
        <div class="status" id="status">⏳ Vérification du backend...</div>
    </div>

<script>
    // 🔥 URL EXACTE DE TON BACKEND RENDER
    const BACKEND_URL = 'https://blk-marketplace2-0-1.onrender.com';

    // ✅ Fonction pour mettre à jour le statut
    function setStatus(message, isError = false) {
        const statusEl = document.getElementById('status');
        statusEl.textContent = message;
        statusEl.style.color = isError ? 'red' : 'green';
    }

    // ✅ Vérifier la connexion au backend
    async function checkBackend() {
        try {
            const response = await fetch(BACKEND_URL);
            if (response.ok) {
                setStatus('✅ Backend connecté');
            } else {
                setStatus('❌ Backend répond mais erreur', true);
            }
        } catch (error) {
            setStatus('❌ Backend indisponible : ' + error.message, true);
        }
    }

    // ✅ Gestion du clic sur "Se connecter"
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const phone = document.getElementById('phone').value;
        const name = document.getElementById('name').value;

        if (!phone) {
            setStatus('❌ Entre ton numéro de téléphone', true);
            return;
        }

        setStatus('⏳ Connexion en cours...');

        try {
            const response = await fetch(`${BACKEND_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, name })
            });

            const data = await response.json();
            if (data.success) {
                setStatus('✅ Connexion réussie !');
            } else {
                setStatus('❌ ' + data.message, true);
            }
        } catch (error) {
            setStatus('❌ Erreur : ' + error.message, true);
        }
    });

    // ✅ Vérification automatique au chargement
    checkBackend();
</script>
</body>
</html>

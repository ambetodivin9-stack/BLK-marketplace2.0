<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLK Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f0e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h1 { text-align: center; color: #FFD700; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { width: 100%; padding: 12px; background: #FFD700; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:hover { background: #f5c400; }
        .status { text-align: center; margin-top: 10px; font-size: 14px; color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BLK Marketplace</h1>
        <input type="text" id="phone" placeholder="Numéro de téléphone" />
        <input type="text" id="name" placeholder="Nom (optionnel)" />
        <button id="loginBtn">Se connecter</button>
        <div class="status" id="status">✅ Backend connecté</div>
    </div>

<script>
    const BACKEND_URL = 'https://blk-marketplace2-0-backend.onrender.com';

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const phone = document.getElementById('phone').value;
        const name = document.getElementById('name').value;
        const status = document.getElementById('status');

        if (!phone) {
            status.textContent = '❌ Entre ton numéro';
            status.style.color = 'red';
            return;
        }

        try {
            const response = await fetch(`${BACKEND_URL}/api/users`);
            const data = await response.json();
            status.textContent = '✅ Connexion réussie !';
            status.style.color = 'green';
        } catch (error) {
            status.textContent = '❌ Erreur : ' + error.message;
            status.style.color = 'red';
        }
    });

    // Vérification du backend
    fetch(BACKEND_URL)
        .then(res => res.json())
        .then(data => {
            document.getElementById('status').textContent = '✅ Backend OK';
        })
        .catch(() => {
            document.getElementById('status').textContent = '❌ Backend indisponible';
            document.getElementById('status').style.color = 'red';
        });
</script>
</body>
</html>
